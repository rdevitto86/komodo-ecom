events {
  worker_connections 1024;
}

http {
  # ── Shared proxy headers ───────────────────────────────────────────────
  proxy_set_header  Host              $host;
  proxy_set_header  X-Real-IP         $remote_addr;
  proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header  X-Forwarded-Proto $scheme;
  proxy_read_timeout  30s;
  proxy_connect_timeout 5s;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS — Auth API ───────────────────────────────────────────────────
  # komodo-auth-api: public port 7011
  server {
    listen 443 ssl;
    server_name auth.yourdomain.com;   # TODO: replace with actual domain

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
      proxy_pass http://auth-api:7011;
    }
  }

  # ── HTTPS — User API ───────────────────────────────────────────────────
  # komodo-user-api: public port 7051
  server {
    listen 443 ssl;
    server_name users.yourdomain.com;  # TODO: replace with actual domain

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
      proxy_pass http://user-api:7051;
    }
  }

  # ── HTTPS — Shop Items API ─────────────────────────────────────────────
  # komodo-shop-items-api: public port 7041
  server {
    listen 443 ssl;
    server_name items.yourdomain.com;  # TODO: replace with actual domain

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
      proxy_pass http://shop-items-api:7041;
    }
  }
}
