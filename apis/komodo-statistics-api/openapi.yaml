openapi: 3.0.3

info:
  title: Komodo Statistics API
  description: |
    Aggregates domain event data from event-bus-api into real-time counters
    and social-proof stats (e.g. "X in carts", "500+ bought last month").
    Public routes serve anonymous UI banners. Private routes expose admin/inter-service aggregates.

    HTTP conventions: POST → 201 Created / 400 Bad Request / 409 Conflict;
    PUT → 200 OK / 404 Not Found; DELETE → 204 No Content / 404 Not Found;
    GET → 200 OK / 404 Not Found.
  version: 0.1.0

servers:
  - url: http://localhost:7111
    description: Public (local dev)
  - url: http://localhost:7112
    description: Private / internal (local dev)

tags:
  - name: Health
    description: Liveness probes
  - name: Stats
    description: Public social-proof counters for UI display
  - name: Events
    description: Event ingestion (public, service-to-service)
  - name: Internal
    description: Admin aggregates (private, service-to-service only)

paths:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is alive

  # ---------------------------------------------------------------------------
  # Public stat reads — served to UI for banners, no auth required
  # ---------------------------------------------------------------------------
  /v1/stats/items/trending:
    get:
      tags: [Stats]
      summary: Trending items across the catalog
      operationId: getTrending
      x-visibility: public
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: period
          in: query
          schema:
            type: string
            enum: [1h, 24h, 7d]
            default: 24h
      responses:
        "200":
          description: Trending item list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"

  /v1/stats/items/{itemId}/in-cart:
    get:
      tags: [Stats]
      summary: How many active carts contain this item
      operationId: getItemInCartCount
      x-visibility: public
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Cart count for item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemCartStat"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/stats/items/{itemId}/recently-bought:
    get:
      tags: [Stats]
      summary: Purchase count for item over a rolling window
      operationId: getItemRecentlyBought
      x-visibility: public
      parameters:
        - $ref: "#/components/parameters/ItemId"
        - name: period
          in: query
          description: Rolling window (default 30d)
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Purchase count for item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemPurchaseStat"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/stats/items/{itemId}/frequently-bought-with:
    get:
      tags: [Stats]
      summary: Items frequently co-purchased with this item
      operationId: getFrequentlyBoughtWith
      x-visibility: public
      parameters:
        - $ref: "#/components/parameters/ItemId"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: Co-purchase pairings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrequentlyBoughtWithResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Public event ingestion — receives events from event-bus-api
  # ---------------------------------------------------------------------------
  /v1/events:
    post:
      tags: [Events]
      summary: Ingest a domain event from event-bus-api
      operationId: ingestEvent
      x-visibility: public
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestEventRequest"
      responses:
        "201":
          description: Event accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Private / internal — service-to-service only (port 7112)
  # ---------------------------------------------------------------------------
  /v1/stats/dashboard:
    get:
      tags: [Internal]
      summary: Aggregate stats dashboard for admin consumers
      operationId: getStatsDashboard
      x-visibility: private
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          description: Start of reporting window (ISO 8601 date)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: End of reporting window (ISO 8601 date)
          schema:
            type: string
            format: date
        - name: granularity
          in: query
          schema:
            type: string
            enum: [day, week, month]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Aggregated platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string

  schemas:

    ItemCartStat:
      type: object
      properties:
        item_id:
          type: string
        in_cart_count:
          type: integer
          description: Number of active carts containing this item
        label:
          type: string
          example: "47 people have this in their cart"

    ItemPurchaseStat:
      type: object
      properties:
        item_id:
          type: string
        purchase_count:
          type: integer
        period:
          type: string
          example: "30d"
        label:
          type: string
          example: "500+ bought in the last month"

    FrequentlyBoughtItem:
      type: object
      properties:
        item_id:
          type: string
        name:
          type: string
        co_purchase_count:
          type: integer

    FrequentlyBoughtWithResponse:
      type: object
      properties:
        item_id:
          type: string
        related_items:
          type: array
          items:
            $ref: "#/components/schemas/FrequentlyBoughtItem"

    TrendingItem:
      type: object
      properties:
        item_id:
          type: string
        name:
          type: string
        trend_score:
          type: number
          format: float

    TrendingResponse:
      type: object
      properties:
        period:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TrendingItem"

    IngestEventRequest:
      type: object
      required: [event_type, source, payload]
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          description: Event type from the platform catalogue (e.g. cart.item_added)
          example: "cart.item_added"
        source:
          type: string
          description: Originating service
          example: "cart-api"
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true

    DashboardStats:
      type: object
      properties:
        active_carts:
          type: integer
        orders_today:
          type: integer
        orders_this_month:
          type: integer
        top_items_in_cart:
          type: array
          items:
            $ref: "#/components/schemas/FrequentlyBoughtItem"
        trending_now:
          type: array
          items:
            $ref: "#/components/schemas/TrendingItem"

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
