name: komodo-user-api

services:
  user-api-public:
    image: ${APP_NAME}-public:${VERSION:-latest}
    build:
      context: ..
      dockerfile: komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: ${DISTROLESS_TAG:-debug}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-512M}
    environment:
      APP_NAME: ${APP_NAME}
      ENV: ${ENV}
      PORT: 7051
      VERSION: ${VERSION}
      LOG_LEVEL: ${LOG_LEVEL}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_SECRET_PREFIX: ${AWS_SECRET_PREFIX}
      AWS_SECRET_BATCH: ${AWS_SECRET_BATCH}
      EVAL_RULES_PATH: /app/config/validation_rules.yaml
    ports:
      - "7051:7051"
      - "7052:7052"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7051/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network

  # Shares the public container's network namespace
  # Accessible to other services on komodo-network as user-api-public:7052.
  # On Fargate, both containers run in the same task and share the task network interface.
  user-api-internal:
    image: ${APP_NAME}-internal:${VERSION:-latest}
    build:
      context: ..
      dockerfile: komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: ${DISTROLESS_TAG:-debug}
    network_mode: "service:user-api-public"
    depends_on:
      user-api-public:
        condition: service_healthy
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-256M}
    environment:
      APP_NAME: ${APP_NAME}
      ENV: ${ENV}
      INTERNAL_PORT: 7052
      VERSION: ${VERSION}
      LOG_LEVEL: ${LOG_LEVEL}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_SECRET_PREFIX: ${AWS_SECRET_PREFIX}
      AWS_SECRET_BATCH: ${AWS_SECRET_BATCH}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7052/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  komodo-network:
    external: true
