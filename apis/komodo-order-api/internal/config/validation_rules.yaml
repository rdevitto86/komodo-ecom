#  ____        _        ____             __ _
# |  _ \ _   _| | ___  / ___|___  _ __  / _(_) __ _
# | |_) | | | | |/ _ \| |   / _ \| '_ \| |_| |/ _` |
# |  _ <| |_| | |  __/| |__| (_) | | | |  _| | (_| |
# |_| \_\\__,_|_|\___| \____\___/|_| |_|_| |_|\__, |
#                                               |___/
#
# Validation Levels:
#   ignore  — skip all validation (health checks, public probes)
#   lenient — validate declared constraints; missing API version is allowed
#   strict  — version header required; all declared constraints enforced
#
# Routes without a version prefix (/me/*, /users/*) use "lenient".
# Upgrade individual routes to "strict" once API versioning is introduced.
#
# Path param pattern for all resource IDs (usr_xxx, addr_xxx, pay_xxx):
#   ^[a-z]{2,6}_[a-zA-Z0-9]{12,32}$
#

rules:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  "/health":
    GET:
      level: "ignore"

  # ---------------------------------------------------------------------------
  # Profile — /me/profile
  # ---------------------------------------------------------------------------
  "/me/profile":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        username:
          type: "string"
          required: true
        email:
          type: "string"
          required: true
        first_name:
          type: "string"
          required: true
        last_name:
          type: "string"
          required: true
        phone:
          type: "string"
          required: false
        middle_initial:
          type: "string"
          required: false
        avatar_url:
          type: "string"
          required: false

    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        username:
          type: "string"
          required: false
        email:
          type: "string"
          required: false
        first_name:
          type: "string"
          required: false
        last_name:
          type: "string"
          required: false
        phone:
          type: "string"
          required: false
        middle_initial:
          type: "string"
          required: false
        avatar_url:
          type: "string"
          required: false

    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

  # ---------------------------------------------------------------------------
  # Addresses — /me/addresses
  # ---------------------------------------------------------------------------
  "/me/addresses":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        line1:
          type: "string"
          required: true
        city:
          type: "string"
          required: true
        state:
          type: "string"
          required: true
        zip_code:
          type: "string"
          required: true
        country:
          type: "string"
          required: true
        alias:
          type: "string"
          required: false
        line2:
          type: "string"
          required: false

  "/me/addresses/{id}":
    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        id:
          type: "string"
          required: true
          pattern: "^[a-z]{2,6}_[a-zA-Z0-9]{12,32}$"
      body:
        line1:
          type: "string"
          required: false
        line2:
          type: "string"
          required: false
        city:
          type: "string"
          required: false
        state:
          type: "string"
          required: false
        zip_code:
          type: "string"
          required: false
        country:
          type: "string"
          required: false
        alias:
          type: "string"
          required: false

    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        id:
          type: "string"
          required: true
          pattern: "^[a-z]{2,6}_[a-zA-Z0-9]{12,32}$"

  # ---------------------------------------------------------------------------
  # Payments — /me/payments
  # ---------------------------------------------------------------------------
  "/me/payments":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      # TODO: add specific body field rules once payment token schema is defined
      # (provider token, billing zip, card type, etc.)

  "/me/payments/{id}":
    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        id:
          type: "string"
          required: true
          pattern: "^[a-z]{2,6}_[a-zA-Z0-9]{12,32}$"

  # ---------------------------------------------------------------------------
  # Preferences — /me/preferences
  # ---------------------------------------------------------------------------
  "/me/preferences":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        language:
          type: "string"
          required: false
        timezone:
          type: "string"
          required: false

    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
