openapi: "3.1.0"
info:
  title: komodo-order-returns-api
  version: "1.0.0"
  description: Returns and RMA service. Customer-facing routes require JWT; admin/service routes require internal service JWT.
servers:
  - url: http://localhost:7062
    description: Local dev

paths:
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK

  /me/returns:
    get:
      summary: List user's return requests
      operationId: listMyReturns
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReturnStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Return requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Initiate a return request
      operationId: createReturn
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnRequest"
      responses:
        "201":
          description: Return request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Order not eligible for return (outside window, already returned, or not fulfilled)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /me/returns/{returnId}:
    get:
      summary: Get return status
      operationId: getMyReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      responses:
        "200":
          description: Return details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Cancel a pending return request
      operationId: cancelMyReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      responses:
        "204":
          description: Return cancelled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Return cannot be cancelled (already approved or processed)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /returns/{returnId}:
    get:
      summary: Get return (admin/service use)
      operationId: getReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      responses:
        "200":
          description: Return details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /returns/{returnId}/approve:
    put:
      summary: Approve return and trigger refund
      operationId: approveReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveReturnRequest"
      responses:
        "200":
          description: Return approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Return not in approvable state
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /returns/{returnId}/receive:
    put:
      summary: Mark items received, trigger restock and loyalty reversal
      operationId: receiveReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      responses:
        "200":
          description: Return processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Return not in approvable state
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /returns/{returnId}/reject:
    put:
      summary: Reject return request
      operationId: rejectReturn
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReturnId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectReturnRequest"
      responses:
        "200":
          description: Return rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReturnId:
      name: returnId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ReturnStatus:
      type: string
      enum: [requested, approved, received, processed, rejected, cancelled]

    ReturnItem:
      type: object
      required: [item_id, sku, quantity, reason]
      properties:
        item_id:
          type: string
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        reason:
          type: string
          enum: [defective, wrong_item, not_as_described, changed_mind, other]
        notes:
          type: string

    Return:
      type: object
      required: [return_id, order_id, status, items, created_at, updated_at]
      properties:
        return_id:
          type: string
          format: uuid
        order_id:
          type: string
        status:
          $ref: "#/components/schemas/ReturnStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReturnItem"
        refund_amount_cents:
          type: integer
        refund_id:
          type: string
          description: Set when refund is initiated
        return_window_expires:
          type: string
          format: date-time
        rejection_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReturnList:
      type: object
      required: [returns]
      properties:
        returns:
          type: array
          items:
            $ref: "#/components/schemas/Return"
        next_cursor:
          type: string

    CreateReturnRequest:
      type: object
      required: [order_id, items]
      properties:
        order_id:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReturnItem"

    ApproveReturnRequest:
      type: object
      properties:
        refund_amount_cents:
          type: integer
          description: Override refund amount. Defaults to full item value if omitted.

    RejectReturnRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Return not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
