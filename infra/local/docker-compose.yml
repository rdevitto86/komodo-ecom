name: komodo-local

# ── Profile guide ──────────────────────────────────────────────────────────
#
#   infra       → localstack + redis                    (AWS emulation only)
#   auth        → infra + auth-api                      (auth/token work)
#   backend     → infra + auth-api + user-api + shop-items-api
#   ui-backend  → backend + ui                          (full local E2E dev)
#   full        → everything                            (all services)
#
# Usage (see Makefile for shortcuts):
#   docker compose --profile backend up -d --build
#   docker compose --profile ui-backend up -d --build
#   docker compose --profile full down --remove-orphans
#
# Individual service compose files (apis/<service>/docker-compose.yaml) still
# work standalone — they reference komodo-network as external, so start infra
# first or use this file's profiles instead.
# ──────────────────────────────────────────────────────────────────────────

networks:
  komodo-network:
    name: komodo-network
    driver: bridge

# Shared AWS env block — all Go services pull secrets from LocalStack SM.
x-aws-local: &aws-local
  AWS_REGION: us-east-1
  AWS_ENDPOINT: http://localstack:4566
  AWS_SECRET_PREFIX: komodo/local
  AWS_SECRET_BATCH: "true"

services:

  # ── Infra ─────────────────────────────────────────────────────────────────

  localstack:
    profiles: [infra, auth, backend, ui-backend, full]
    container_name: localstack-main
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    entrypoint: >
      /bin/sh -c "apt-get update && apt-get install -y jq redis-tools && /usr/local/bin/docker-entrypoint.sh"
    environment:
      DEBUG: "0"
      ENV: local
      SERVICES: secretsmanager,s3,dynamodb,rds
    env_file:
      - localstack/.env
    volumes:
      - ./localstack/volume:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init:/etc/localstack/init/ready.d
    networks:
      - komodo-network

  redis:
    profiles: [infra, auth, backend, ui-backend, full]
    container_name: komodo-redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass test-password
    networks:
      - komodo-network

  # ── Auth API — 7011 public · 7012 internal ────────────────────────────────

  auth-api-public:
    profiles: [auth, backend, ui-backend, full]
    build:
      context: ./apis
      dockerfile: komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api
      ENV: local
      PORT: ":7011"
      INTERNAL_PORT: ":7012"
      EVAL_RULES_PATH: /app/config/validation_rules.yml
    ports:
      - "7011:7011"
      - "7012:7012"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - localstack
    networks:
      - komodo-network

  auth-api-internal:
    profiles: [auth, backend, ui-backend, full]
    build:
      context: ./apis
      dockerfile: komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api-internal
      ENV: local
      INTERNAL_PORT: ":7012"
    depends_on:
      auth-api-public:
        condition: service_healthy
    network_mode: "service:auth-api-public"

  # ── User API — 7051 public · 7052 internal ────────────────────────────────

  user-api-public:
    profiles: [backend, ui-backend, full]
    build:
      context: ./apis
      dockerfile: komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-user-api
      ENV: local
      PORT: ":7051"
      LOG_LEVEL: debug
      EVAL_RULES_PATH: /app/config/validation_rules.yaml
    ports:
      - "7051:7051"
      - "7052:7052"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7051/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  user-api-internal:
    profiles: [backend, ui-backend, full]
    build:
      context: ./apis
      dockerfile: komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-user-api-internal
      ENV: local
      INTERNAL_PORT: ":7052"
      LOG_LEVEL: debug
    depends_on:
      user-api-public:
        condition: service_healthy
    network_mode: "service:user-api-public"

  # ── Shop Items API — 7041 ──────────────────────────────────────────────────

  shop-items-api:
    profiles: [backend, ui-backend, full]
    build:
      context: ./apis
      dockerfile: komodo-shop-items-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-shop-items-api
      ENV: local
      PORT: ":7041"
      EVAL_RULES_PATH: /app/config/validation_rules.yml
    ports:
      - "7041:7041"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7041/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── UI — 7001 (hot-reload dev build) ──────────────────────────────────────

  ui:
    profiles: [ui-backend, full]
    build:
      context: ./ui
      target: dev
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ENV: local
      PORT: "7001"
      LOG_LEVEL: debug
    ports:
      - "7001:7001"
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      auth-api-public:
        condition: service_healthy
    networks:
      - komodo-network

  # ── SSR Engine — 7003 ─────────────────────────────────────────────────────

  ssr-engine:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-ssr-engine-svelte/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      PORT: "7003"
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      S3_CONTENT_BUCKET: komodo-static-assets-dev
      CLOUDFRONT_DISTRIBUTION_ID: ""
    ports:
      - "7003:7003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7003/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network

  # ── Order API — 7061 ──────────────────────────────────────────────────────

  order-api:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-order-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-order-api
      ENV: local
      PORT: ":7061"
    ports:
      - "7061:7061"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7061/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Payments API — 7071 ───────────────────────────────────────────────────

  payments-api:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-payments-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-payments-api
      ENV: local
      PORT: ":7071"
    ports:
      - "7071:7071"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7071/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Communications API — 7081 ─────────────────────────────────────────────

  communications-api:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-communications-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-communications-api
      ENV: local
      PORT: ":7081"
    ports:
      - "7081:7081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Search API — 7042 ─────────────────────────────────────────────────────

  search-api:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-search-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-search-api
      ENV: local
      PORT: ":7042"
    ports:
      - "7042:7042"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7042/health"]
      interval: 30s
