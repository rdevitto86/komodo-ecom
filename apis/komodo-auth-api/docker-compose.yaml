name: komodo-auth-api

services:
  auth-api-public:
    image: komodo-auth-api-public:${VERSION:-dev}
    build:
      context: ..
      dockerfile: komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: ${DISTROLESS_TAG:-debug}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-512M}
    env_file:
      - ../../infra/local/env.shared
    environment:
      APP_NAME: komodo-auth-api
      PORT: :7011
      INTERNAL_PORT: :7012
      VERSION: ${VERSION:-dev}
      EVAL_RULES_PATH: /app/config/validation_rules.yaml
    ports:
      - "7011:7011"
      - "7012:7012"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - komodo-network

  auth-api-internal:
    image: komodo-auth-api-internal:${VERSION:-dev}
    build:
      context: ..
      dockerfile: komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: ${DISTROLESS_TAG:-debug}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-512M}
    env_file:
      - ../../infra/local/env.shared
    environment:
      APP_NAME: komodo-auth-api
      INTERNAL_PORT: :7012
      VERSION: ${VERSION:-dev}
    depends_on:
      auth-api-public:
        condition: service_healthy
    # Shares the public container's network namespace — both ports are on one
    # Fargate task / local Docker bridge without a second NIC or VIP.
    network_mode: "service:auth-api-public"

networks:
  komodo-network:
    external: true
