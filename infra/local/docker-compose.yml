          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api-internal
      ENV: local
      INTERNAL_PORT: ":7012"
    depends_on:
      auth-api-public:
        condition: service_healthy
    network_mode: "service:auth-api-public"

