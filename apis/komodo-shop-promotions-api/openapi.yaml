openapi: "3.1.0"
info:
  title: komodo-shop-promotions-api
  version: "1.0.0"
  description: |
    Promo code validation and automatic discount management.

    **Two servers:**
    - Public (7045): validate and list promotions for customers (guest-friendly)
    - Internal (7046): admin promotion management for service-to-service calls

    **HTTP conventions:**
    - POST → 201 Created / 400 Bad Request / 409 Conflict
    - PUT → 200 OK / 404 Not Found
    - DELETE → 204 No Content / 404 Not Found
    - GET → 200 OK / 404 Not Found

servers:
  - url: http://localhost:7045
    description: Public (local)
  - url: http://localhost:7046
    description: Internal (local)

tags:
  - name: Health
  - name: Validate
  - name: Promotions

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK

  /v1/validate:
    post:
      tags: [Validate]
      summary: Validate a promo code against a cart
      operationId: validatePromo
      x-visibility: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidatePromoRequest"
      responses:
        "200":
          description: Promo is valid; returns discount details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoValidation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Promo exists but cannot be applied (expired, cap hit, conditions not met)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/promotions:
    get:
      tags: [Promotions]
      summary: |
        Public: list applicable automatic promotions for the requesting user or guest.
        Internal: list all promotions with optional status filter (admin).
        Route is port-disambiguated — 7045 serves the public view, 7046 serves the admin view.
      operationId: listPromotions
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: cart_subtotal_cents
          in: query
          schema:
            type: integer
          description: (Public) Current cart subtotal for condition evaluation
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/PromotionStatus"
          description: (Internal) Filter by promotion status
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: (Internal) Max results to return
        - name: cursor
          in: query
          schema:
            type: string
          description: (Internal) Pagination cursor
      responses:
        "200":
          description: Promotion list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Promotions]
      summary: Create a promotion (internal only)
      operationId: createPromotion
      x-visibility: private
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromotionRequest"
      responses:
        "201":
          description: Promotion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Promotion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/promotions/{promoId}:
    get:
      tags: [Promotions]
      summary: Get a single promotion by ID (public)
      operationId: getPromotion
      x-visibility: public
      security: []
      parameters:
        - $ref: "#/components/parameters/PromoId"
      responses:
        "200":
          description: Promotion details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Promotion"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Promotions]
      summary: Update a promotion (internal only)
      operationId: updatePromotion
      x-visibility: private
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PromoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromotionRequest"
      responses:
        "200":
          description: Promotion updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Promotion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Promotions]
      summary: Deactivate a promotion (internal only)
      operationId: deactivatePromotion
      x-visibility: private
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PromoId"
      responses:
        "204":
          description: Promotion deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PromoId:
      name: promoId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    PromotionType:
      type: string
      enum: [percentage_off, fixed_amount_off, free_shipping, buy_x_get_y]

    PromotionStatus:
      type: string
      enum: [active, inactive, expired]

    PromotionConditions:
      type: object
      properties:
        min_order_cents:
          type: integer
          description: Minimum cart subtotal required
        eligible_skus:
          type: array
          items:
            type: string
          description: If set, promo only applies to these SKUs
        eligible_categories:
          type: array
          items:
            type: string
          description: If set, promo only applies to items in these categories

    Promotion:
      type: object
      required: [promo_id, code, type, discount_value, status, created_at, updated_at]
      properties:
        promo_id:
          type: string
          format: uuid
        code:
          type: string
        type:
          $ref: "#/components/schemas/PromotionType"
        discount_value:
          type: integer
          description: Percentage (0–100) for percentage_off; cents for fixed_amount_off
        conditions:
          $ref: "#/components/schemas/PromotionConditions"
        status:
          $ref: "#/components/schemas/PromotionStatus"
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        max_redemptions:
          type: integer
        redemption_count:
          type: integer
        per_user_limit:
          type: integer
          default: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PromotionList:
      type: object
      required: [promotions]
      properties:
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/Promotion"
        next_cursor:
          type: string

    PromoValidation:
      type: object
      required: [promo_id, code, type, discount_cents, description]
      properties:
        promo_id:
          type: string
          format: uuid
        code:
          type: string
        type:
          $ref: "#/components/schemas/PromotionType"
        discount_cents:
          type: integer
          description: Computed discount amount in cents for this cart
        description:
          type: string

    ValidatePromoRequest:
      type: object
      required: [code, cart_subtotal_cents]
      properties:
        code:
          type: string
        cart_subtotal_cents:
          type: integer
        user_id:
          type: string
          description: Optional; enables per-user cap enforcement for guest-aware checkout

    CreatePromotionRequest:
      type: object
      required: [code, type, discount_value]
      properties:
        code:
          type: string
        type:
          $ref: "#/components/schemas/PromotionType"
        discount_value:
          type: integer
        conditions:
          $ref: "#/components/schemas/PromotionConditions"
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        max_redemptions:
          type: integer
        per_user_limit:
          type: integer
          default: 1

    UpdatePromotionRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PromotionStatus"
        discount_value:
          type: integer
        conditions:
          $ref: "#/components/schemas/PromotionConditions"
        description:
          type: string
        end_at:
          type: string
          format: date-time
        max_redemptions:
          type: integer

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Promotion not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
