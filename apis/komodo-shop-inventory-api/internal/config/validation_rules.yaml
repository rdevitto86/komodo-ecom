#  ____        _        ____             __ _
# |  _ \ _   _| | ___  / ___|___  _ __  / _(_) __ _
# | |_) | | | | |/ _ \| |   / _ \| '_ \| |_| |/ _` |
# |  _ <| |_| | |  __/| |__| (_) | | | |  _| | (_| |
# |_| \_\\__,_|_|\___| \____\___/|_| |_|_| |_|\__, |
#                                               |___/
#
# Validation Levels:
#   ignore  — skip all validation (health checks, public probes)
#   lenient — validate declared constraints; missing API version is allowed
#   strict  — version header required; all declared constraints enforced
#
# All routes except /health are internal-only and require an internal service JWT
# (client_credentials scope). Not exposed via public API gateway.
# Upgrade individual routes to "strict" once API versioning is introduced.
#

rules:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  "/health":
    GET:
      level: "ignore"

  # ---------------------------------------------------------------------------
  # Batch stock — /stock
  # ---------------------------------------------------------------------------
  "/stock":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

  # ---------------------------------------------------------------------------
  # Single SKU stock — /stock/{sku}
  # ---------------------------------------------------------------------------
  "/stock/{sku}":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        sku:
          type: "string"
          required: true

  # ---------------------------------------------------------------------------
  # Stock reservation — /stock/{sku}/reserve
  # ---------------------------------------------------------------------------
  "/stock/{sku}/reserve":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        sku:
          type: "string"
          required: true
      body:
        cart_id:
          type: "string"
          required: true
        quantity:
          type: "number"
          required: true

  # ---------------------------------------------------------------------------
  # Hold release — /stock/{sku}/reserve/{holdId}
  # ---------------------------------------------------------------------------
  "/stock/{sku}/reserve/{holdId}":
    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        sku:
          type: "string"
          required: true
        holdId:
          type: "string"
          required: true

  # ---------------------------------------------------------------------------
  # Stock confirm — /stock/{sku}/confirm
  # ---------------------------------------------------------------------------
  "/stock/{sku}/confirm":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        sku:
          type: "string"
          required: true
      body:
        hold_id:
          type: "string"
          required: true

  # ---------------------------------------------------------------------------
  # Restock — /stock/{sku}/restock
  # ---------------------------------------------------------------------------
  "/stock/{sku}/restock":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        sku:
          type: "string"
          required: true
      body:
        quantity:
          type: "number"
          required: true
        reason:
          type: "string"
          required: false
