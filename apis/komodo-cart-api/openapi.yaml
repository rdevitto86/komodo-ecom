openapi: "3.1.0"
info:
  title: komodo-cart-api
  version: "1.0.0"
  description: |
    Shopping cart service — guest and authenticated cart management with checkout stock hold coordination.

    Guest carts are identified by a `X-Session-ID` header (UUID set by the client on first cart interaction,
    stored in a cookie). Authenticated carts are identified by the JWT subject. The merge route transitions
    a guest cart into an authenticated one after login.

    **HTTP conventions:**
    - POST → 201 Created / 400 Bad Request / 409 Conflict
    - PUT → 200 OK / 404 Not Found
    - DELETE → 204 No Content / 404 Not Found
    - GET → 200 OK / 404 Not Found

servers:
  - url: http://localhost:7043
    description: Local dev (public)

tags:
  - name: Health
  - name: Cart
  - name: Saved

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK

  /v1/cart:
    get:
      tags: [Cart]
      summary: Get cart — authenticated (JWT) or guest (X-Session-ID)
      operationId: getCart
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Cart retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Cart]
      summary: Clear cart — authenticated (JWT) or guest (X-Session-ID)
      operationId: clearCart
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Cart cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/cart/merge:
    post:
      tags: [Cart]
      summary: Merge a guest cart into the authenticated cart
      operationId: mergeGuestCart
      x-visibility: public
      description: |
        Merges items from a guest cart (Redis) into the authenticated user's cart (DynamoDB).
        Quantities are additive for duplicate items; authenticated cart wins on price/name conflicts.
        The guest cart Redis key is deleted after a successful merge.
        Returns the merged cart — no separate GET needed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeCartRequest"
      responses:
        "200":
          description: Guest cart merged, merged cart returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Guest cart not found (missing or expired — both return 404)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart — authenticated (JWT) or guest (X-Session-ID)
      operationId: addCartItem
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddItemRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/cart/items/{itemId}:
    put:
      tags: [Cart]
      summary: Update item quantity in cart — authenticated (JWT) or guest (X-Session-ID)
      operationId: updateCartItem
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ItemId"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Cart]
      summary: Remove item from cart — authenticated (JWT) or guest (X-Session-ID)
      operationId: deleteCartItem
      x-visibility: public
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ItemId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/cart/checkout:
    post:
      tags: [Cart]
      summary: Initiate checkout — places stock holds, returns checkout token
      operationId: initiateCheckout
      x-visibility: public
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Checkout initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Insufficient stock for one or more items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/cart/saved:
    get:
      tags: [Saved]
      summary: Get saved-for-later items for the authenticated user
      operationId: getSavedItems
      x-visibility: public
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedItemsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Saved]
      summary: Save an item for later (move from cart or add directly)
      operationId: saveItem
      x-visibility: public
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveItemRequest"
      responses:
        "201":
          description: Item saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/cart/saved/{itemId}:
    delete:
      tags: [Saved]
      summary: Remove a saved-for-later item
      operationId: deleteSavedItem
      x-visibility: public
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: Saved item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/cart/saved/{itemId}/move:
    post:
      tags: [Saved]
      summary: Move a saved-for-later item back into the cart
      operationId: moveSavedItemToCart
      x-visibility: public
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item moved to cart; returns updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Item is out of stock and cannot be moved back to cart
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: X-Session-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Guest session token (set by client on cart creation, stored in cookie). Required for unauthenticated requests.

  schemas:
    Cart:
      type: object
      required: [id, items, subtotal_cents, item_count, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          description: Present for authenticated carts only
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal_cents:
          type: integer
          description: Sum of (unit_price_cents * quantity) for all items
        item_count:
          type: integer
        updated_at:
          type: string
          format: date-time

    CartItem:
      type: object
      required: [item_id, sku, quantity, unit_price_cents, name]
      properties:
        item_id:
          type: string
          description: Product ID from shop-items-api
        sku:
          type: string
          description: Variant SKU
        name:
          type: string
          description: Product name snapshot at add-time
        quantity:
          type: integer
          minimum: 1
        unit_price_cents:
          type: integer
          description: Price snapshot at add-time
        image_url:
          type: string

    SavedItem:
      type: object
      required: [item_id, sku, name, unit_price_cents, saved_at]
      properties:
        item_id:
          type: string
          description: Product ID from shop-items-api
        sku:
          type: string
          description: Variant SKU
        name:
          type: string
          description: Product name snapshot at save-time
        unit_price_cents:
          type: integer
          description: Price snapshot at save-time
        image_url:
          type: string
        saved_at:
          type: string
          format: date-time

    SavedItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SavedItem"

    MergeCartRequest:
      type: object
      required: [guest_cart_id]
      properties:
        guest_cart_id:
          type: string
          format: uuid
          description: |
            UUID of the guest cart to merge. Generated client-side by the UI,
            stored in localStorage, and sent here after login.

    AddItemRequest:
      type: object
      required: [item_id, sku, quantity]
      properties:
        item_id:
          type: string
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1

    UpdateItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 0
          description: Set to 0 to remove the item

    SaveItemRequest:
      type: object
      required: [item_id, sku]
      properties:
        item_id:
          type: string
        sku:
          type: string

    CheckoutResponse:
      type: object
      required: [checkout_token, expires_at, items]
      properties:
        checkout_token:
          type: string
          description: Short-lived token passed to order-api to confirm purchase
        expires_at:
          type: string
          format: date-time
          description: When the stock holds expire (CART_HOLD_TTL_SEC from now)
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Session token does not match cart
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Cart or item not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
