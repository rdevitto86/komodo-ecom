name: komodo-order-reservations-api

services:
  order-reservations-api:
    image: komodo-order-reservations-api:${VERSION:-dev}
    build:
      context: ..
      dockerfile: komodo-order-reservations-api/Dockerfile
      args:
        ENV: ${ENV:-local}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-256M}
    env_file:
      - ../../infra/local/env.shared
    environment:
      APP_NAME: komodo-order-reservations-api
      PORT: 7063
      VERSION: ${VERSION:-dev}
    ports:
      - "7063:7063"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7063/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network
networks:
  komodo-network:
    external: true
