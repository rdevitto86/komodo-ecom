openapi: "3.1.0"
info:
  title: komodo-events-api
  version: "1.0.0"
  description: |
    Internal event relay service. Accepts domain events from producer services and
    fans out to consumers via AWS SNS + SQS. Internal-only — all routes except /health
    require an internal service JWT.
servers:
  - url: http://localhost:7002
    description: Local dev

paths:
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK

  /events:
    post:
      summary: Publish an event
      operationId: publishEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventEnvelope"
      responses:
        "202":
          description: Event accepted for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Unknown event type or invalid payload for declared version
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /events/types:
    get:
      summary: List registered event types
      operationId: listEventTypes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Event type catalogue
          content:
            application/json:
              schema:
                type: object
                required: [types]
                properties:
                  types:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventType"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    EventEnvelope:
      type: object
      required: [id, type, version, source, occurred_at, payload]
      properties:
        id:
          type: string
          format: uuid
          description: Idempotency key — consumers must deduplicate on this
        type:
          type: string
          description: "<domain>.<action> e.g. order.placed"
          example: order.placed
        version:
          type: string
          description: Numeric string — increment when payload shape changes
          example: "1"
        source:
          type: string
          description: Publishing service name
          example: komodo-order-api
        occurred_at:
          type: string
          format: date-time
          description: When the event happened (not when it was published)
        payload:
          type: object
          description: Event-specific data — typed per event type and version

    PublishResponse:
      type: object
      required: [event_id, message_id]
      properties:
        event_id:
          type: string
          format: uuid
          description: Echo of the submitted event ID
        message_id:
          type: string
          description: SNS message ID (or local correlation ID in dev)

    EventType:
      type: object
      required: [type, version, producers, consumers]
      properties:
        type:
          type: string
          example: order.placed
        version:
          type: string
          example: "1"
        producers:
          type: array
          items:
            type: string
        consumers:
          type: array
          items:
            type: string

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
