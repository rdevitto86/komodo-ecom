openapi: "3.1.0"
info:
  title: komodo-order-reservations-api
  version: "0.1.0"
  description: |
    Order reservation service for inventory management. Manages technician booking slots and reservations.
servers:
  - url: http://localhost:7035
    description: Local dev

tags:
  - name: Health
  - name: Slots
  - name: Bookings

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy

  /slots:
    get:
      tags: [Slots]
      summary: Get all available slots
      operationId: getAvailableSlots
      security: []
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"

  /slots/{date}:
    get:
      tags: [Slots]
      summary: Get available slots for a specific date
      operationId: getSlotsByDate
      security: []
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Available slots for date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"

  /bookings:
    post:
      tags: [Bookings]
      summary: Create a booking
      operationId: createBooking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get a booking by ID
      operationId: getBooking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Bookings]
      summary: Cancel a booking
      operationId: cancelBooking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /bookings/{id}/confirm:
    put:
      tags: [Bookings]
      summary: Confirm a booking
      operationId: confirmBooking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TimeSlot:
      type: object
      required: [start, end, available]
      properties:
        start:
          type: string
          description: HH:MM format
        end:
          type: string
          description: HH:MM format
        available:
          type: boolean

    SlotsResponse:
      type: object
      required: [date, slots]
      properties:
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: "#/components/schemas/TimeSlot"

    CreateBookingRequest:
      type: object
      required: [date, slot_start, slot_end]
      properties:
        date:
          type: string
          format: date
        slot_start:
          type: string
          description: HH:MM format
        slot_end:
          type: string
          description: HH:MM format
        notes:
          type: string

    Booking:
      type: object
      required: [id, date, slot_start, slot_end, status, created_at]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        slot_start:
          type: string
          description: HH:MM format
        slot_end:
          type: string
          description: HH:MM format
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Booking not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
