name: komodo-returns-api

services:
  returns-api:
    image: komodo-returns-api:${VERSION:-dev}
    build:
      context: ..
      dockerfile: komodo-returns-api/Dockerfile
      args:
        DISTROLESS_TAG: ${DISTROLESS_TAG:-debug}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-256M}
    env_file:
      - ../../infra/local/env.shared
    environment:
      APP_NAME: komodo-returns-api
      PORT: :7062
      VERSION: ${VERSION:-dev}
    ports:
      - "7062:7062"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7062/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - komodo-network

networks:
  komodo-network:
    external: true
