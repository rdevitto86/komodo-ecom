openapi: "3.1.0"
info:
  title: komodo-loyalty-api
  version: "1.0.0"
  description: |
    Loyalty program management and product reviews service.
    Absorbed komodo-reviews-api (both services share the Loyalty & Social domain).
    All routes are public and require a user JWT.

    HTTP conventions:
    - POST → 201 Created / 400 Bad Request / 409 Conflict
    - PUT → 200 OK / 404 Not Found
    - DELETE → 204 No Content / 404 Not Found
    - GET → 200 OK / 404 Not Found

servers:
  - url: http://localhost:7091
    description: Local dev

tags:
  - name: Health
  - name: Loyalty
  - name: Reviews

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy

  /v1/loyalty:
    get:
      tags: [Loyalty]
      summary: Get current user's loyalty points balance and tier status
      operationId: getLoyalty
      x-visibility: public
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loyalty account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/loyalty/redeem:
    post:
      tags: [Loyalty]
      summary: Redeem loyalty points against a cart or order
      operationId: redeemPoints
      x-visibility: public
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRequest"
      responses:
        "201":
          description: Redemption applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Insufficient points or redemption already applied

  /v1/reviews:
    post:
      tags: [Reviews]
      summary: Submit a review
      description: Submit a product review. Requires a verified purchase for the item.
      operationId: submitReview
      x-visibility: public
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid request body
        "403":
          description: Not eligible — purchase required
        "409":
          description: Already reviewed this item

  /v1/reviews/{reviewId}:
    put:
      tags: [Reviews]
      summary: Update own review
      operationId: updateReview
      x-visibility: public
      security:
        - bearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewRequest"
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "403":
          description: Not your review
        "404":
          description: Review not found
    delete:
      tags: [Reviews]
      summary: Delete own review
      operationId: deleteReview
      x-visibility: public
      security:
        - bearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Review deleted
        "403":
          description: Not your review
        "404":
          description: Review not found

  /v1/items/{itemId}/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for an item
      description: Returns paginated reviews for a product. No authentication required.
      operationId: listItemReviews
      x-visibility: public
      security: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated review listing with aggregate rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "404":
          description: Item not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoyaltyAccount:
      type: object
      required: [user_id, points_balance, tier, created_at]
      properties:
        user_id:
          type: string
        points_balance:
          type: integer
          minimum: 0
        tier:
          type: string
          enum: [bronze, silver, gold, platinum]
        points_to_next_tier:
          type: integer
          description: Points needed to reach the next tier. Null if already at highest tier.
        created_at:
          type: string
          format: date-time

    RedeemRequest:
      type: object
      required: [points, order_id]
      properties:
        points:
          type: integer
          minimum: 1
          description: Number of points to redeem
        order_id:
          type: string
          format: uuid

    RedeemResult:
      type: object
      required: [redeemed_points, discount_cents, remaining_balance]
      properties:
        redeemed_points:
          type: integer
        discount_cents:
          type: integer
          description: Dollar value of the redeemed points in cents
        remaining_balance:
          type: integer
          description: Points balance after redemption

    Review:
      type: object
      properties:
        reviewId:
          type: string
        userId:
          type: string
        itemId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string
        verifiedPurchase:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubmitReviewRequest:
      type: object
      required: [itemId, rating]
      properties:
        itemId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string

    ReviewListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        totalCount:
          type: integer
        avgRating:
          type: number
          format: float
        page:
          type: integer
        limit:
          type: integer

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
