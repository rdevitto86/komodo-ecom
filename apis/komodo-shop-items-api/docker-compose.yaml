name: komodo-shop-items-api

services:
  shop-items-api:
    image: komodo-shop-items-api:${VERSION:-dev}
    build:
      context: ..
      dockerfile: komodo-shop-items-api/Dockerfile
      args:
        ENV: ${ENV:-local}
    restart: ${RESTART_POLICY:-no}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-512M}
    env_file:
      - ../../infra/local/env.shared
    environment:
      APP_NAME: komodo-shop-items-api
      PORT: 7041
      VERSION: ${VERSION:-dev}
      EVAL_RULES_PATH: /app/config/validation_rules.yaml
    ports:
      - "7041:7041"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7041/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network
networks:
  komodo-network:
    external: true
