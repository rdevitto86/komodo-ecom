# |  _ \ _   _| | ___  / ___|___  _ __  / _(_) __ _
# | |_) | | | | |/ _ \| |   / _ \| '_ \| |_| |/ _` |
# |  _ <| |_| | |  __/| |__| (_) | | | |  _| | (_| |
# |_| \_\\__,_|_|\___| \____\___/|_| |_|_| |_|\__, |
#                                               |___/
#
# Validation Levels:
#   ignore  — skip all validation (health checks, public probes)
#   lenient — validate declared constraints; missing API version is allowed
#   strict  — version header required; all declared constraints enforced
#
# Routes without a version prefix (/me/*, /returns/*) use "lenient".
# Upgrade individual routes to "strict" once API versioning is introduced.
#

rules:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  "/health":
    GET:
      level: "ignore"

  # ---------------------------------------------------------------------------
  # User returns — /me/returns (JWT required)
  # ---------------------------------------------------------------------------
  "/me/returns":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        order_id:
          type: "string"
          required: true
        items:
          type: "array"
          required: true
        reason:
          type: "string"
          required: true

    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

  "/me/returns/{returnId}":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        returnId:
          type: "string"
          required: true

    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        returnId:
          type: "string"
          required: true

  # ---------------------------------------------------------------------------
  # Internal returns — /returns (internal JWT, admin/service use)
  # ---------------------------------------------------------------------------
  "/returns/{returnId}":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        returnId:
          type: "string"
          required: true

  "/returns/{returnId}/approve":
    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        returnId:
          type: "string"
          required: true

  "/returns/{returnId}/receive":
    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        returnId:
          type: "string"
          required: true

  "/returns/{returnId}/reject":
    PUT:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      params:
        returnId:
          type: "string"
          required: true
      body:
        reason:
          type: "string"
          required: true
