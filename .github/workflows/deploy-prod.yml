name: Deploy → PROD

# Manual production deploy with explicit service selection.
# Requires the `production` GitHub Environment, which should have:
#   - Required reviewers (1–2 approvers)
#   - Deployment branch rule: main only
#   - Wait timer: optional (e.g. 10 min soak after stg)
#
# The image-tag MUST match a SHA that has already been validated in STG.
# No rebuild happens here — the same image is promoted from ECR.
#
# To set up GitHub Environment protection:
#   Settings → Environments → production → Add required reviewers

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Git SHA to promote from STG (REQUIRED — must have passed STG)'
        required: true

      # ── Service toggles ──────────────────────────────────────────────────
      deploy-ui:
        description: 'Deploy ui'
        type: boolean
        default: false
      deploy-auth-api:
        description: 'Deploy auth-api'
        type: boolean
        default: false
      deploy-user-api:
        description: 'Deploy user-api'
        type: boolean
        default: false
      deploy-shop-items-api:
        description: 'Deploy shop-items-api'
        type: boolean
        default: false
      deploy-address-api:
        description: 'Deploy address-api'
        type: boolean
        default: false
      deploy-ssr-engine:
        description: 'Deploy ssr-engine-svelte'
        type: boolean
        default: false
      deploy-order-api:
        description: 'Deploy order-api'
        type: boolean
        default: false
      deploy-payments-api:
        description: 'Deploy payments-api'
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # NEVER cancel an in-flight prod deploy

jobs:
  # ── Gate: require approval via GitHub Environment ─────────────────────────
  # The `production` environment must have required reviewers configured.
  # This job will pause here until an approver clicks "Review deployments".
  gate:
    name: Await Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm deploy intent
        run: |
          echo "Deploying image ${{ inputs.image-tag }} to PRODUCTION"
          echo "Services selected:"
          echo "  ui:             ${{ inputs.deploy-ui }}"
          echo "  auth-api:       ${{ inputs.deploy-auth-api }}"
          echo "  user-api:       ${{ inputs.deploy-user-api }}"
          echo "  shop-items-api: ${{ inputs.deploy-shop-items-api }}"
          echo "  address-api:    ${{ inputs.deploy-address-api }}"
          echo "  ssr-engine:     ${{ inputs.deploy-ssr-engine }}"
          echo "  order-api:      ${{ inputs.deploy-order-api }}"
          echo "  payments-api:   ${{ inputs.deploy-payments-api }}"

  # ── Per-service deploy jobs ───────────────────────────────────────────────

  deploy-ui:
    name: Deploy ui → prod
    needs: gate
    if: inputs.deploy-ui == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: ui
      env: prod
      image-tag: ${{ inputs.image-tag }}
      build-context: ui
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-auth-api:
    name: Deploy auth-api → prod
    needs: gate
    if: inputs.deploy-auth-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: auth-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-user-api:
    name: Deploy user-api → prod
    needs: gate
    if: inputs.deploy-user-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: user-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-shop-items-api:
    name: Deploy shop-items-api → prod
    needs: gate
    if: inputs.deploy-shop-items-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: shop-items-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-address-api:
    name: Deploy address-api → prod
    needs: gate
    if: inputs.deploy-address-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: address-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-ssr-engine:
    name: Deploy ssr-engine-svelte → prod
    needs: gate
    if: inputs.deploy-ssr-engine == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: ssr-engine-svelte
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-order-api:
    name: Deploy order-api → prod
    needs: gate
    if: inputs.deploy-order-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: order-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  deploy-payments-api:
    name: Deploy payments-api → prod
    needs: gate
    if: inputs.deploy-payments-api == true
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: payments-api
      env: prod
      image-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: PROD Deploy Summary
    runs-on: ubuntu-latest
    needs:
      - gate
      - deploy-ui
      - deploy-auth-api
      - deploy-user-api
      - deploy-shop-items-api
      - deploy-address-api
      - deploy-ssr-engine
      - deploy-order-api
      - deploy-payments-api
    if: always()
    steps:
      - name: Report outcomes
        run: |
          echo "## PROD Deploy Results (image: ${{ inputs.image-tag }})" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ui              | ${{ needs.deploy-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| auth-api        | ${{ needs.deploy-auth-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| user-api        | ${{ needs.deploy-user-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| shop-items-api  | ${{ needs.deploy-shop-items-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| address-api     | ${{ needs.deploy-address-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ssr-engine      | ${{ needs.deploy-ssr-engine.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| order-api       | ${{ needs.deploy-order-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| payments-api    | ${{ needs.deploy-payments-api.result }} |" >> $GITHUB_STEP_SUMMARY
