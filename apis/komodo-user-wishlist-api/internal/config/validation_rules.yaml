# | |_) | | | | |/ _ \| |   / _ \| '_ \| |_| |/ _` |
# |  _ <| |_| | |  __/| |__| (_) | | | |  _| | (_| |
# |_| \_\\__,_|_|\___| \____\___/|_| |_|_| |_|\__, |
#                                               |___/
#
# Validation Levels:
#   ignore  — skip all validation (health checks, public probes)
#   lenient — validate declared constraints; missing API version is allowed
#   strict  — version header required; all declared constraints enforced
#
# Routes without a version prefix use "lenient".
# Upgrade individual routes to "strict" once API versioning is introduced.
#

rules:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  "/health":
    GET:
      level: "ignore"

  # ---------------------------------------------------------------------------
  # User wishlist — /me/wishlist (JWT required for all)
  # ---------------------------------------------------------------------------
  "/me/wishlist":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

  "/me/wishlist/items":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        item_id:
          type: "string"
          required: true
        sku:
          type: "string"
          required: true

  "/me/wishlist/items/{itemId}":
    DELETE:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
      params:
        itemId:
          type: "string"
          required: true

  "/me/wishlist/availability":
    GET:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"

  "/me/wishlist/move-to-cart":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        item_ids:
          type: "array"
          required: true
