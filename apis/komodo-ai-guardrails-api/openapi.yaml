openapi: "3.1.0"
info:
  title: komodo-ai-guardrails-api
  version: "0.1.0"
  description: |
    Content moderation and guardrails proxy. Detects PII, prompt injection,
    and toxicity before text is forwarded to LLM providers.
    Private-only (Lambda, port 7023).

    **Note:** The README and previous spec listed port 7113 (Analytics block). The correct port
    per CLAUDE.md and ROUTES.md is 7023 (Core Platform block). The README should be updated.

    **HTTP conventions:**
    - POST → 201 Created / 400 Bad Request / 409 Conflict
    - PUT → 200 OK / 404 Not Found
    - DELETE → 204 No Content / 404 Not Found
    - GET → 200 OK / 404 Not Found

servers:
  - url: http://localhost:7023
    description: Local dev (private only)

tags:
  - name: Health
  - name: Guardrails

paths:

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: health
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: komodo-ai-guardrails-api
                  version:
                    type: string
                    example: "0.1.0"
                  provider:
                    type: string
                    example: local
                required: [status, service, version, provider]

  /v1/moderate:
    post:
      tags: [Guardrails]
      summary: Run guardrail checks on a text payload
      operationId: moderate
      x-visibility: private
      security:
        - ServiceJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerateRequest"
      responses:
        "200":
          description: Check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          description: Validation error

components:
  securitySchemes:
    ServiceJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: M2M service JWT — client credentials grant via auth-api

  schemas:
    CheckType:
      type: string
      enum: [pii, injection, deviation, coding, obscenity, toxicity]
      description: |
        - pii: PII detection and redaction in user input; coercion-to-reveal attempts (rule-based)
        - injection: Instruction overrides, delimiter escapes, encoded payloads (rule-based)
        - deviation: Persona override and jailbreak attempts (rule-based)
        - coding: Out-of-scope code generation / execution requests (rule-based)
        - obscenity: Obscenity check (LLM-backed, stubbed)
        - toxicity: Toxicity check (LLM-backed, stubbed)

    ModerateRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 8192
          description: Text to evaluate
        checks:
          type: array
          items:
            $ref: "#/components/schemas/CheckType"
          default: [pii, injection, deviation, coding, obscenity, toxicity]
          description: Which checks to run. Defaults to all.

    ModerateResponse:
      type: object
      required: [passed, flags, redacted_text, provider, latency_ms]
      properties:
        passed:
          type: boolean
          description: True if no flags were raised
        flags:
          type: array
          items:
            type: string
          description: List of flag identifiers raised (e.g. "pii.email", "injection")
        redacted_text:
          type: string
          description: Input text with PII replaced by safe placeholders
        provider:
          type: string
          description: Active LLM provider used for this request
        latency_ms:
          type: integer
          description: Processing time in milliseconds

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
