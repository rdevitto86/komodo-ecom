name: komodo-local

# ── Profile guide ──────────────────────────────────────────────────────────
#
#   Group profiles (for ad-hoc use):
#     infra   → localstack + redis + auth-api   (always starts via just up)
#     api     → all backend API services
#     ui      → ui
#     support → ssr-engine + future tooling
#
#   Per-service profiles:
#     auth-api, event-bus-api,
#     entitlements-api (*), features-api (*), address-api (*),
#     shop-items-api, search-api, cart-api, shop-inventory-api,
#     user-api, order-api, order-returns-api, order-reservations-api,
#     payments-api, communications-api,
#     loyalty-api, reviews-api, support-api,
#     ui, ssr-engine
#
#   (*) No Dockerfile yet — stub entries below, uncomment when ready.
#
# Usage:
#   just up                  # infra only
#   just up api              # infra + enabled APIs
#   just up api ui           # infra + enabled APIs + ui
#   just up api ui support   # everything
#   just down
#
# ──────────────────────────────────────────────────────────────────────────

networks:
  komodo-network:
    name: komodo-network
    driver: bridge

# Shared AWS env blocks
x-aws-local: &aws-local
  AWS_REGION: us-east-2
  AWS_ENDPOINT: http://localstack:4566
  AWS_SECRET_PREFIX: komodo/local
  AWS_SECRET_BATCH: "true"

services:

  # ── Infra (always starts) ──────────────────────────────────────────────

  localstack:
    profiles: [infra]
    container_name: localstack-main
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    entrypoint: >
      /bin/sh -c "apt-get update && apt-get install -y jq redis-tools && /usr/local/bin/docker-entrypoint.sh"
    environment:
      DEBUG: "0"
      ENV: local
      SERVICES: secretsmanager,s3,dynamodb,sqs,sns
    env_file:
      - localstack/.env
    volumes:
      - ./localstack/volume:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init:/etc/localstack/init/ready.d
    networks:
      - komodo-network

  redis:
    profiles: [infra]
    container_name: komodo-redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass test-password
    networks:
      - komodo-network

  # ── UI — 7001 ─────────────────────────────────────────────────────────

  ui:
    profiles: [ui]
    build:
      context: ../../ui
      target: dev
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ENV: local
      PORT: "7001"
      LOG_LEVEL: debug
    ports:
      - "7001:7001"
    volumes:
      - ../../ui:/app
      - /app/node_modules
    depends_on:
      auth-api-public:
        condition: service_healthy
    networks:
      - komodo-network

  # ── Event Bus API — 7002 ──────────────────────────────────────────────

  event-bus-api:
    profiles: [api, event-bus-api]
    build:
      context: ../..
      dockerfile: apis/komodo-events-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-events-api
      ENV: local
      PORT: ":7002"
    ports:
      - "7002:7002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── SSR Engine — 7003 ─────────────────────────────────────────────────

  ssr-engine:
    profiles: [support, ssr-engine]
    build:
      context: ../..
      dockerfile: apis/komodo-ssr-engine-svelte/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      PORT: "7003"
      NODE_ENV: development
      AWS_REGION: us-east-2
      AWS_ENDPOINT: http://localstack:4566
      S3_CONTENT_BUCKET: komodo-static-assets-dev
      CLOUDFRONT_DISTRIBUTION_ID: ""
    ports:
      - "7003:7003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7003/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network

  # ── Auth API — 7011 public · 7012 internal (always starts) ────────────

  auth-api-public:
    profiles: [infra, auth-api]
    build:
      context: ../..
      dockerfile: apis/komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api
      ENV: local
      PORT: ":7011"
      INTERNAL_PORT: ":7012"
      EVAL_RULES_PATH: /app/config/validation_rules.yml
    ports:
      - "7011:7011"
      - "7012:7012"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - localstack
    networks:
      - komodo-network

  auth-api-internal:
    profiles: [infra, auth-api]
    build:
      context: ../..
      dockerfile: apis/komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
