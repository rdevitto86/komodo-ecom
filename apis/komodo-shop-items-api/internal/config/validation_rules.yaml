# | |_) | | | | |/ _ \| |   / _ \| '_ \| |_| |/ _` |
# |  _ <| |_| | |  __/| |__| (_) | | | |  _| | (_| |
# |_| \_\\__,_|_|\___| \____\___/|_| |_|_| |_|\__, |
#                                               |___/
#
# Validation Levels:
#   ignore  — skip all validation (health checks, public probes)
#   lenient — validate declared constraints; missing API version is allowed
#   strict  — version header required; all declared constraints enforced
#
# Public routes: /health, /item/inventory, /item/{sku} (no auth required)
# Protected routes: /item/suggestion (JWT required)
# Upgrade individual routes to "strict" once API versioning is introduced.
#

rules:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  "/health":
    GET:
      level: "ignore"

  # ---------------------------------------------------------------------------
  # Inventory — /item/inventory (public)
  # ---------------------------------------------------------------------------
  "/item/inventory":
    GET:
      level: "lenient"

  # ---------------------------------------------------------------------------
  # Item by SKU — /item/{sku} (public)
  # ---------------------------------------------------------------------------
  "/item/{sku}":
    GET:
      level: "lenient"
      params:
        sku:
          type: "string"
          required: true

  # ---------------------------------------------------------------------------
  # Suggestions — /item/suggestion (JWT required)
  # ---------------------------------------------------------------------------
  "/item/suggestion":
    POST:
      level: "lenient"
      headers:
        Authorization:
          required: true
          value: "Bearer *"
        Content-Type:
          required: true
          value: "application/json"
      body:
        userId:
          type: "string"
          required: false
        skus:
          type: "array"
          required: false
        categories:
          type: "array"
          required: false
        limit:
          type: "number"
          required: false
