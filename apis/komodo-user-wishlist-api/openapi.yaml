openapi: "3.1.0"
info:
  title: komodo-user-wishlist-api
  version: "1.0.0"
  description: Persistent per-user wishlist. Save items, check real-time stock availability, and move items to cart. All routes require JWT.
servers:
  - url: http://localhost:7053
    description: Local dev

paths:
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK

  /me/wishlist:
    get:
      summary: Get the user's wishlist
      operationId: getWishlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wishlist contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wishlist/items:
    post:
      summary: Add an item to the wishlist
      operationId: addWishlistItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWishlistItemRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Item already in wishlist
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /me/wishlist/items/{itemId}:
    delete:
      summary: Remove an item from the wishlist
      operationId: removeWishlistItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: Item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/wishlist/availability:
    get:
      summary: Check stock availability for all items in the wishlist
      operationId: getWishlistAvailability
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Per-item availability status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistAvailability"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wishlist/move-to-cart:
    post:
      summary: Move one or more wishlist items to cart
      operationId: moveToCart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveToCartRequest"
      responses:
        "200":
          description: Items moved; returns per-item result (some may fail if out of stock)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveToCartResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string

  schemas:
    WishlistItem:
      type: object
      required: [item_id, sku, name, added_at]
      properties:
        item_id:
          type: string
        sku:
          type: string
        name:
          type: string
          description: Denormalized item name snapshotted at add time
        image_url:
          type: string
        price_cents:
          type: integer
          description: Denormalized price snapshotted at add time
        added_at:
          type: string
          format: date-time

    Wishlist:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WishlistItem"

    AddWishlistItemRequest:
      type: object
      required: [item_id, sku]
      properties:
        item_id:
          type: string
        sku:
          type: string
        name:
          type: string
        image_url:
          type: string
        price_cents:
          type: integer

    ItemAvailability:
      type: object
      required: [item_id, sku, in_stock]
      properties:
        item_id:
          type: string
        sku:
          type: string
        in_stock:
          type: boolean
        available_qty:
          type: integer

    WishlistAvailability:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemAvailability"

    MoveToCartRequest:
      type: object
      required: [item_ids]
      properties:
        item_ids:
          type: array
          minItems: 1
          items:
            type: string
          description: item_id values to move to cart

    MoveToCartResultItem:
      type: object
      required: [item_id, moved]
      properties:
        item_id:
          type: string
        moved:
          type: boolean
        reason:
          type: string
          description: Present when moved=false (e.g. "out_of_stock")

    MoveToCartResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MoveToCartResultItem"

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Item not found in wishlist
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
