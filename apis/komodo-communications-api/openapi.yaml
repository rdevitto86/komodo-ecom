openapi: "3.1.0"
info:
  title: komodo-communications-api
  version: "1.0.0"
  description: |
    Communications service for sending transactional notifications via email, SMS, and push.
    All routes are private (service-to-service only). Callers must supply a service JWT
    (client_credentials). No user JWT routes in V1.

    HTTP conventions:
    - POST → 201 Created / 400 Bad Request / 409 Conflict
    - PUT → 200 OK / 404 Not Found
    - DELETE → 204 No Content / 404 Not Found
    - GET → 200 OK / 404 Not Found

servers:
  - url: http://localhost:7081
    description: Local dev (private)

tags:
  - name: Health
  - name: Send

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy

  /v1/send/email:
    post:
      tags: [Send]
      summary: Send a transactional email
      operationId: sendEmail
      x-visibility: private
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailRequest"
      responses:
        "201":
          description: Email queued for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/send/sms:
    post:
      tags: [Send]
      summary: Send an SMS message
      operationId: sendSms
      x-visibility: private
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSmsRequest"
      responses:
        "201":
          description: SMS queued for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/send/push:
    post:
      tags: [Send]
      summary: Send a push notification
      operationId: sendPush
      x-visibility: private
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPushRequest"
      responses:
        "201":
          description: Push notification queued for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SendEmailRequest:
      type: object
      required: [to, template_id]
      properties:
        to:
          type: string
          format: email
          description: Recipient email address
        reply_to:
          type: string
          format: email
        template_id:
          type: string
          description: Template identifier (resolved from S3 template store)
        template_data:
          type: object
          description: Key/value pairs injected into the template at render time
          additionalProperties: true
        locale:
          type: string
          description: BCP-47 locale tag (e.g. en-US). Defaults to en-US.
          default: en-US

    SendSmsRequest:
      type: object
      required: [to, body]
      properties:
        to:
          type: string
          description: E.164 formatted phone number (e.g. +12125551234)
        body:
          type: string
          maxLength: 1600

    SendPushRequest:
      type: object
      required: [device_token, title, body]
      properties:
        device_token:
          type: string
          description: FCM or APNs device token
        title:
          type: string
        body:
          type: string
        data:
          type: object
          description: Arbitrary key/value payload delivered alongside the notification
          additionalProperties: true

    SendResult:
      type: object
      required: [message_id, status]
      properties:
        message_id:
          type: string
          description: Provider-assigned message identifier for tracking
        status:
          type: string
          enum: [queued, sent, failed]

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid service JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
