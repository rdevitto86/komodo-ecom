name: komodo-local

# ── Profile guide ──────────────────────────────────────────────────────────
#
#   Group profiles (for ad-hoc use):
#     infra   → localstack + redis + auth-api   (always starts via make up)
#     api     → all backend API services
#     ui      → ui
#     support → ssr-engine + future tooling
#
#   Per-service profiles (driven by infra/local/services.txt):
#     auth-api, user-api, shop-items, order-api, payments-api,
#     communications-api, search-api, reviews-api, ui, ssr-engine
#
# Usage:
#   make up                            # infra only
#   make up API=1                      # infra + enabled APIs
#   make up API=1 UI=1                 # infra + enabled APIs + ui
#   make up API=1 PROXY=1              # route AWS calls to real dev endpoints
#   make up API=1 UI=1 SUPPORT=1       # everything enabled in services.txt
#
# ──────────────────────────────────────────────────────────────────────────

networks:
  komodo-network:
    name: komodo-network
    driver: bridge

# Shared AWS env blocks
x-aws-local: &aws-local
  AWS_REGION: us-east-1
  AWS_ENDPOINT: http://localstack:4566
  AWS_SECRET_PREFIX: komodo/local
  AWS_SECRET_BATCH: "true"

services:

  # ── Infra (always starts) ──────────────────────────────────────────────

  localstack:
    profiles: [infra]
    container_name: localstack-main
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    entrypoint: >
      /bin/sh -c "apt-get update && apt-get install -y jq redis-tools && /usr/local/bin/docker-entrypoint.sh"
    environment:
      DEBUG: "0"
      ENV: local
      SERVICES: secretsmanager,s3,dynamodb,rds
    env_file:
      - localstack/.env
    volumes:
      - ./localstack/volume:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init:/etc/localstack/init/ready.d
    networks:
      - komodo-network

  redis:
    profiles: [infra]
    container_name: komodo-redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass test-password
    networks:
      - komodo-network

  # ── Auth API — 7011 public · 7012 internal (always starts) ────────────

  auth-api-public:
    profiles: [infra, auth-api]
    build:
      context: ../..
      dockerfile: apis/komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api
      ENV: local
      PORT: ":7011"
      INTERNAL_PORT: ":7012"
      EVAL_RULES_PATH: /app/config/validation_rules.yml
    ports:
      - "7011:7011"
      - "7012:7012"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - localstack
    networks:
      - komodo-network

  auth-api-internal:
    profiles: [infra, auth-api]
    build:
      context: ../..
      dockerfile: apis/komodo-auth-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-auth-api-internal
      ENV: local
      INTERNAL_PORT: ":7012"
    depends_on:
      auth-api-public:
        condition: service_healthy
    network_mode: "service:auth-api-public"

  # ── User API — 7051 public · 7052 internal ────────────────────────────

  user-api-public:
    profiles: [api, user-api]
    build:
      context: ../..
      dockerfile: apis/komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: public
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-user-api
      ENV: local
      PORT: ":7051"
      LOG_LEVEL: debug
      EVAL_RULES_PATH: /app/config/validation_rules.yaml
    ports:
      - "7051:7051"
      - "7052:7052"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7051/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  user-api-internal:
    profiles: [api, user-api]
    build:
      context: ../..
      dockerfile: apis/komodo-user-api/Dockerfile
      args:
        BUILD_TARGET: internal
        DISTROLESS_TAG: debug
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-user-api-internal
      ENV: local
      INTERNAL_PORT: ":7052"
      LOG_LEVEL: debug
    depends_on:
      user-api-public:
        condition: service_healthy
    network_mode: "service:user-api-public"

  # ── Shop Items API — 7041 ─────────────────────────────────────────────

  shop-items-api:
    profiles: [api, shop-items]
    build:
      context: ../..
      dockerfile: apis/komodo-shop-items-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *aws-local
      APP_NAME: komodo-shop-items-api
      ENV: local
      PORT: ":7041"
      EVAL_RULES_PATH: /app/config/validation_rules.yml
    ports:
      - "7041:7041"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7041/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Order API — 7061 ──────────────────────────────────────────────────

  order-api:
    profiles: [api, order-api]
    build:
      context: ../..
      dockerfile: apis/komodo-order-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-order-api
      ENV: local
      PORT: ":7061"
    ports:
      - "7061:7061"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7061/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Payments API — 7071 ───────────────────────────────────────────────

  payments-api:
    profiles: [api, payments-api]
    build:
      context: ../..
      dockerfile: apis/komodo-payments-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-payments-api
      ENV: local
      PORT: ":7071"
    ports:
      - "7071:7071"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7071/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Communications API — 7081 ─────────────────────────────────────────

  communications-api:
    profiles: [api, communications-api]
    build:
      context: ../..
      dockerfile: apis/komodo-communications-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-communications-api
      ENV: local
      PORT: ":7081"
    ports:
      - "7081:7081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Search API — 7042 ─────────────────────────────────────────────────

  search-api:
    profiles: [api, search-api]
    build:
      context: ../..
      dockerfile: apis/komodo-search-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-search-api
      ENV: local
      PORT: ":7042"
    ports:
      - "7042:7042"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7042/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── Reviews API — 7092 ────────────────────────────────────────────────

  reviews-api:
    profiles: [api, reviews-api]
    build:
      context: ../..
      dockerfile: apis/komodo-reviews-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-reviews-api
      ENV: local
      PORT: ":7092"
    ports:
      - "7092:7092"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7092/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      - localstack
    networks:
      - komodo-network

  # ── UI — 7001 ─────────────────────────────────────────────────────────

  ui:
    profiles: [ui]
    build:
      context: ../../ui
      target: dev
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ENV: local
      PORT: "7001"
      LOG_LEVEL: debug
    ports:
      - "7001:7001"
    volumes:
      - ../../ui:/app
      - /app/node_modules
    depends_on:
      auth-api-public:
        condition: service_healthy
    networks:
      - komodo-network

  # ── SSR Engine — 7003 ─────────────────────────────────────────────────

  ssr-engine:
    profiles: [support, ssr-engine]
    build:
      context: ../..
      dockerfile: apis/komodo-ssr-engine-svelte/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      PORT: "7003"
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      S3_CONTENT_BUCKET: komodo-static-assets-dev
      CLOUDFRONT_DISTRIBUTION_ID: ""
    ports:
      - "7003:7003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7003/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - komodo-network
