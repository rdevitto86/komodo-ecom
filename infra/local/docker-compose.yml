      - komodo-network

  # ── Reviews API — 7092 ────────────────────────────────────────────────────

  reviews-api:
    profiles: [full]
    build:
      context: ./apis
      dockerfile: komodo-reviews-api/Dockerfile
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *aws-local
      APP_NAME: komodo-reviews-api
      ENV: local
      PORT: ":7092"
    ports:
      - "7092:7092"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
