openapi: "3.1.0"
info:
  title: komodo-ssr-engine-svelte
  version: "0.1.0"
  description: |
    SvelteKit-based SSR engine with API endpoints for services, orders, marketing, products, and content management.
    Uses Bun runtime.
servers:
  - url: http://localhost:7003
    description: Local dev

tags:
  - name: Health
  - name: Services
  - name: Orders
  - name: Marketing
  - name: Products
  - name: Landing
  - name: Admin

paths:

  /api/health:
    get:
      tags: [Health]
      summary: Liveness check with S3 connectivity
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service degraded (S3 unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/services/{id}:
    get:
      tags: [Services]
      summary: Get service details
      operationId: getService
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /api/v1/services/scheduling/{id}:
    get:
      tags: [Services]
      summary: Get service scheduling details
      operationId: getServiceScheduling
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service scheduling details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceScheduling"

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order details
      operationId: getOrder
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /api/v1/marketing/user/{id}:
    get:
      tags: [Marketing]
      summary: Get user marketing content
      operationId: getUserMarketing
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User marketing content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMarketing"

  /api/v1/marketing/content/{id}:
    get:
      tags: [Marketing]
      summary: Get marketing content by ID
      operationId: getMarketingContent
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marketing content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingContent"

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Get product details
      operationId: getProduct
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /api/v1/landing:
    get:
      tags: [Landing]
      summary: Get landing page content
      operationId: getLanding
      security: []
      responses:
        "200":
          description: Landing page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingContent"

  /api/v1/admin/manage/content/invalidate:
    post:
      tags: [Admin]
      summary: Invalidate cached content
      operationId: invalidateContent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvalidateRequest"
      responses:
        "200":
          description: Content invalidated

  /api/v1/admin/manage/content/upsert:
    post:
      tags: [Admin]
      summary: Upsert content
      operationId: upsertContent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertContentRequest"
      responses:
        "200":
          description: Content upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        s3:
          type: string
          enum: [ok, error, unknown]

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    ServiceScheduling:
      type: object
      properties:
        id:
          type: string
        available_slots:
          type: array
          items:
            type: string

    Order:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        total:
          type: number

    UserMarketing:
      type: object
      properties:
        user_id:
          type: string
        campaigns:
          type: array
          items:
            type: string

    MarketingContent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number

    LandingContent:
      type: object
      properties:
        hero_title:
          type: string
        hero_subtitle:
          type: string
        featured_products:
          type: array
          items:
            type: string

    InvalidateRequest:
      type: object
      required: [content_ids]
      properties:
        content_ids:
          type: array
          items:
            type: string

    UpsertContentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: object
          additionalProperties: true

    Content:
      type: object
      properties:
        id:
          type: string
        updated_at:
          type: string
          format: date-time

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
